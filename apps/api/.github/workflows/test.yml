name: Structural Copilot Tests

on: [push, pull_request]

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Run unit tests
        run: |
          cd apps/api
          pytest tests/unit/ -v --cov=core --cov-fail-under=95

  integration_tests:
    runs-on: ubuntu-latest
    needs: unit_tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run integration tests
        run: |
          cd apps/api
          pytest tests/integration/ -v --asyncio-mode=auto

  benchmark_tests:
    runs-on: ubuntu-latest
    needs: unit_tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio
      - name: Run engineering benchmarks
        run: |
          cd apps/api
          pytest tests/benchmarks/ -v --tb=long

  e2e_tests:
    runs-on: ubuntu-latest
    needs: [integration_tests, benchmark_tests]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio playwright httpx
      - name: Install Playwright
        run: playwright install chromium
      - name: Run E2E tests
        run: |
          cd apps/api
          pytest tests/e2e/ -v --asyncio-mode=auto
