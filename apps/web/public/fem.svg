<svg class="eng-ai-icon concept-matrix working" xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 120 120" width="100" height="100">
  <style>
    .concept-matrix {
      --brand-primary: #38bdf8;   /* Structural Sky Blue */
      --brand-stress: #ef4444;    /* Force Vector Red */
      --grid-dark: #1e293b;       /* Minor Grid */
      background: #0f172a;
      border-radius: 24%;
    }

    /* I-Beam Solid Flanges */
    .ibeam-flange {
      stroke: #64748b;
      stroke-width: 4;
      stroke-linecap: round;
    }

    /* Mesh Lines */
    .mesh-line {
      stroke: var(--grid-dark);
      stroke-width: 1;
    }
    .load-path {
      stroke: var(--brand-primary);
      stroke-width: 1.5;
      fill: none;
      opacity: 0.4;
    }

    /* Node Points */
    .matrix-node {
      fill: #475569;
      transition: all 0.3s ease;
    }
    .active-core {
      fill: var(--brand-stress);
      filter: drop-shadow(0 0 4px var(--brand-stress));
    }

    /* ANIMATION: THINKING (Matrix Calculation Node Iteration) */
    .concept-matrix.thinking .n1 { animation: nodeFlash 1.2s infinite 0.1s; }
    .concept-matrix.thinking .n2 { animation: nodeFlash 1.2s infinite 0.4s; }
    .concept-matrix.thinking .n3 { animation: nodeFlash 1.2s infinite 0.2s; }
    .concept-matrix.thinking .n4 { animation: nodeFlash 1.2s infinite 0.5s; }
    .concept-matrix.thinking .active-core { animation: coreStress 0.8s ease-in-out infinite alternate; }

    /* ANIMATION: WORKING (Load Vector Flow) */
    .concept-matrix.working .load-path {
      stroke-dasharray: 8 20;
      animation: vectorFlow 1.5s linear infinite;
      opacity: 1;
    }

    @keyframes nodeFlash {
      0%, 100% { fill: #475569; filter: none; }
      50% { fill: var(--brand-primary); filter: drop-shadow(0 0 3px var(--brand-primary)); }
    }
    @keyframes coreStress {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.3); opacity: 1; filter: drop-shadow(0 0 8px var(--brand-stress)); }
    }
    @keyframes vectorFlow {
      to { stroke-dashoffset: -28; }
    }
  </style>

  <g class="mesh-lines">
    <line class="mesh-line" x1="20" y1="35" x2="80" y2="35" />
    <line class="mesh-line" x1="20" y1="65" x2="80" y2="65" />
    <line class="mesh-line" x1="35" y1="20" x2="35" y2="80" />
    <line class="mesh-line" x1="65" y1="20" x2="65" y2="80" />
  </g>

  <path class="load-path" d="M 20,20 L 35,35 L 50,50 L 65,65 L 80,80 M 80,20 L 65,35 L 50,50 L 35,65 L 20,80" />
  <path class="load-path" d="M 50,20 L 50,80 M 20,50 L 80,50" />

  <line class="ibeam-flange" x1="20" y1="20" x2="80" y2="20" />
  <line class="ibeam-flange" x1="20" y1="80" x2="80" y2="80" />
  <line class="ibeam-flange" x1="50" y1="20" x2="50" y2="32" />
  <line class="ibeam-flange" x1="50" y1="68" x2="50" y2="80" />

  <circle class="matrix-node n1" cx="35" cy="35" r="3" />
  <circle class="matrix-node n2" cx="65" cy="35" r="3" />
  <circle class="matrix-node n3" cx="35" cy="65" r="3" />
  <circle class="matrix-node n4" cx="65" cy="65" r="3" />

  <circle class="active-core" cx="50" cy="50" r="4.5" transform-origin="50 50" />
</svg>