services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    # Apply schema migrations before serving so the durable Postgres-backed
    # config (project store + LangGraph AsyncPostgresSaver) starts on a current
    # schema. Migrations are the source of truth in deployed environments.
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/design_suite
      # Durable backends: persist projects/artifacts and in-flight pipeline state.
      - PROJECT_STORE_BACKEND=postgres
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=design_suite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d design_suite"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
